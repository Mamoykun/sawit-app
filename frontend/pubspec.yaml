name: sawitku
description: Platform Manajemen Kebun Sawit
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP client
  dio: ^5.4.0
  # Local storage
  shared_preferences: ^2.2.2
  # State management
  provider: ^6.1.1
  # Charts
  fl_chart: ^0.66.2
  # Fonts
  google_fonts: ^6.1.0
  # JSON
  json_annotation: ^4.8.1
  # Date formatting
  intl: ^0.19.0
  # PDF generation & sharing
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.3
  # Image picker & compression (Diagnosa Visual)
  image_picker: ^1.0.7
  flutter_image_compress: ^2.3.0
  # WebView for Midtrans Snap payment page
  webview_flutter: ^4.7.0
  # Offline mode
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  connectivity_plus: ^6.0.3
  # File sharing
  share_plus: ^10.1.2
  # Excel import / export
  excel: ^4.0.6
  # File picker
  file_picker: ^8.1.4
  # Local notifications for reminder pemupukan
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#166534"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#166534"
  image: assets/icon/icon.png
  color_dark: "#14532d"
  image_dark: assets/icon/icon.png
  android_12:
    image: assets/icon/icon.png
    color: "#166534"
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
