<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="header">
  <header class="bg-emerald-700 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-xl font-bold">Sawitku Admin</span>
      </div>
      <div class="flex items-center gap-4 text-sm">
        <span class="text-emerald-200" th:text="${adminEmail}">admin@sawitku.id</span>
        <a href="/admin/logout"
           class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded text-white text-xs font-medium transition-colors">
          Logout
        </a>
      </div>
    </div>
  </header>
</th:block>
</body>
</html>
