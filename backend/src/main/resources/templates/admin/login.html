<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Sawitku</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="text-center mb-8">
        <div class="text-4xl mb-2">🌾</div>
        <h1 class="text-2xl font-bold text-slate-800">Sawitku Admin</h1>
        <p class="text-slate-500 text-sm mt-1">Login dengan akun admin</p>
      </div>

      <div th:if="${loginError}"
           class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4">
        Email atau password salah, atau akun bukan admin.
      </div>

      <div th:if="${logoutMsg}"
           class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm rounded-lg px-4 py-3 mb-4">
        Anda telah logout.
      </div>

      <form method="post" action="/admin/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" name="username" required autocomplete="email"
                 placeholder="admin@sawitku.id"
                 class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm
                        focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm
                        focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
        <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold
                       py-2.5 rounded-lg text-sm transition-colors">
          Login
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-slate-400 mt-4">
      Hanya untuk admin yang terotorisasi
    </p>
  </div>
</body>
</html>
