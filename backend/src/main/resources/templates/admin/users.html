<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Admin Sawitku</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div th:insert="~{admin/_header :: header}"></div>

  <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-12 gap-6">
    <aside class="col-span-12 md:col-span-3">
      <div th:insert="~{admin/_nav :: nav}"></div>
    </aside>

    <main class="col-span-12 md:col-span-9 space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold text-slate-800">Users</h2>
        <span class="text-sm text-slate-500" th:text="${#lists.size(users)} + ' ditampilkan'">0 ditampilkan</span>
      </div>

      <!-- Search -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
        <form method="get" action="/admin/users" class="flex gap-3">
          <input type="text" name="search"
                 th:value="${search}"
                 placeholder="Cari nama atau email..."
                 class="flex-1 px-4 py-2 border border-slate-200 rounded-lg text-sm
                        focus:outline-none focus:ring-2 focus:ring-emerald-500">
          <button type="submit"
                  class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700">
            Cari
          </button>
          <a th:if="${search}" href="/admin/users"
             class="px-4 py-2 border border-slate-200 rounded-lg text-sm text-slate-600 hover:bg-slate-50">
            Reset
          </a>
        </form>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="min-w-full divide-y divide-slate-100">
          <thead class="bg-slate-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">ID</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Nama</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Email</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Paket</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Daftar</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Aksi</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-50">
            <tr th:each="u : ${users}" class="hover:bg-slate-50 transition-colors">
              <td class="px-4 py-3 text-xs text-slate-400" th:text="${u.id}">1</td>
              <td class="px-4 py-3 text-sm font-medium text-slate-800" th:text="${u.name}">Nama</td>
              <td class="px-4 py-3 text-sm text-slate-600" th:text="${u.email}">email@example.com</td>
              <td class="px-4 py-3">
                <span th:if="${u.subscription != null}"
                      th:classappend="${u.subscription.paket.name() == 'PRO'} ? 'bg-purple-100 text-purple-700' :
                                      (${u.subscription.paket.name() == 'PETANI'} ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-600')"
                      class="text-xs font-medium px-2 py-0.5 rounded-full"
                      th:text="${u.subscription.paket}">GRATIS</span>
                <span th:if="${u.subscription == null}"
                      class="text-xs font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">-</span>
              </td>
              <td class="px-4 py-3 text-xs text-slate-400"
                  th:text="${u.createdAt != null} ? ${#temporals.format(u.createdAt, 'dd MMM yyyy')} : '-'">-</td>
              <td class="px-4 py-3">
                <a th:href="'/admin/users/' + ${u.id}"
                   class="text-xs text-emerald-600 hover:text-emerald-800 font-medium hover:underline">
                  Detail
                </a>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
              <td colspan="6" class="px-4 py-12 text-center text-slate-400 text-sm">
                Tidak ada user ditemukan
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div th:if="${hasMore or page > 0}" class="flex gap-2">
        <a th:if="${page > 0}"
           th:href="'/admin/users?page=' + ${page - 1} + (${search != null} ? '&amp;search=' + ${search} : '')"
           class="px-4 py-2 border border-slate-200 rounded-lg text-sm text-slate-600 hover:bg-slate-50">
          Sebelumnya
        </a>
        <a th:if="${hasMore}"
           th:href="'/admin/users?page=' + ${page + 1} + (${search != null} ? '&amp;search=' + ${search} : '')"
           class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700">
          Selanjutnya
        </a>
      </div>
    </main>
  </div>
</body>
</html>
