<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log - Admin Sawitku</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div th:insert="~{admin/_header :: header}"></div>

  <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-12 gap-6">
    <aside class="col-span-12 md:col-span-3">
      <div th:insert="~{admin/_nav :: nav}"></div>
    </aside>

    <main class="col-span-12 md:col-span-9 space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold text-slate-800">Audit Log</h2>
        <span class="text-sm text-slate-500" th:text="${#lists.size(logs)} + ' entri'">0 entri</span>
      </div>

      <!-- Filter -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
        <form method="get" action="/admin/audit" class="flex flex-wrap gap-3 items-end">
          <div class="flex-1 min-w-48">
            <label class="block text-xs font-medium text-slate-500 mb-1 uppercase">Filter Action</label>
            <select name="action"
                    class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm
                           focus:outline-none focus:ring-2 focus:ring-emerald-500">
              <option value="">Semua action</option>
              <option th:each="opt : ${actionOptions}"
                      th:value="${opt}"
                      th:text="${opt}"
                      th:selected="${filterAction == opt}">ACTION</option>
            </select>
          </div>
          <button type="submit"
                  class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700">
            Filter
          </button>
          <a th:if="${filterAction}" href="/admin/audit"
             class="px-4 py-2 border border-slate-200 rounded-lg text-sm text-slate-600 hover:bg-slate-50">
            Reset
          </a>
        </form>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="min-w-full divide-y divide-slate-100 text-sm">
          <thead class="bg-slate-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Waktu</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Action</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">User</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Entity</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">IP</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">OK</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-50">
            <tr th:each="log : ${logs}" class="hover:bg-slate-50">
              <td class="px-4 py-2.5 text-xs text-slate-400 whitespace-nowrap"
                  th:text="${#temporals.format(log.occurredAt, 'dd/MM HH:mm:ss', new java.util.Locale('id'))}">-</td>
              <td class="px-4 py-2.5">
                <span class="text-xs font-medium px-2 py-0.5 rounded-full"
                      th:classappend="${log.success} ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'"
                      th:text="${log.action}">ACTION</span>
              </td>
              <td class="px-4 py-2.5">
                <a th:if="${log.userId != null}"
                   th:href="'/admin/users/' + ${log.userId}"
                   class="text-xs text-emerald-600 hover:underline"
                   th:text="${log.userEmail ?: log.userId}">user</a>
                <span th:if="${log.userId == null}" class="text-xs text-slate-400">system</span>
              </td>
              <td class="px-4 py-2.5 text-xs text-slate-500">
                <span th:if="${log.entityType != null}"
                      th:text="${log.entityType} + (${log.entityId != null} ? ' #' + ${log.entityId} : '')"></span>
                <span th:if="${log.entityType == null}" class="text-slate-300">-</span>
              </td>
              <td class="px-4 py-2.5 text-xs text-slate-400"
                  th:text="${log.ipAddress ?: '-'}">-</td>
              <td class="px-4 py-2.5 text-center">
                <span th:text="${log.success} ? 'v' : 'x'"
                      th:classappend="${log.success} ? 'text-emerald-500' : 'text-red-500'"
                      class="text-sm font-bold">v</span>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(logs)}">
              <td colspan="6" class="px-4 py-12 text-center text-slate-400 text-sm">
                Tidak ada audit log
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div th:if="${hasMore or page > 0}" class="flex gap-2">
        <a th:if="${page > 0}"
           th:href="'/admin/audit?page=' + ${page - 1} + (${filterAction != null} ? '&amp;action=' + ${filterAction} : '')"
           class="px-4 py-2 border border-slate-200 rounded-lg text-sm text-slate-600 hover:bg-slate-50">
          Sebelumnya
        </a>
        <a th:if="${hasMore}"
           th:href="'/admin/audit?page=' + ${page + 1} + (${filterAction != null} ? '&amp;action=' + ${filterAction} : '')"
           class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700">
          Selanjutnya
        </a>
      </div>
    </main>
  </div>
</body>
</html>
