<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments - Admin Sawitku</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div th:insert="~{admin/_header :: header}"></div>

  <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-12 gap-6">
    <aside class="col-span-12 md:col-span-3">
      <div th:insert="~{admin/_nav :: nav}"></div>
    </aside>

    <main class="col-span-12 md:col-span-9 space-y-6">
      <h2 class="text-xl font-bold text-slate-800">Payments</h2>

      <!-- KPI Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
          <p class="text-xs text-slate-500 uppercase font-medium">Total Revenue</p>
          <p class="text-3xl font-bold text-emerald-600 mt-2">
            Rp <span th:text="${#numbers.formatInteger(totalRevenue, 0, 'COMMA')}">0</span>
          </p>
          <p class="text-xs text-slate-400 mt-1">Status SETTLEMENT</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
          <p class="text-xs text-slate-500 uppercase font-medium">Subscription Aktif</p>
          <div class="flex gap-3 mt-3">
            <th:block th:each="row : ${paketBreakdown}">
              <div class="text-center">
                <p class="text-2xl font-bold text-slate-800" th:text="${row[1]}">0</p>
                <p class="text-xs text-slate-500" th:text="${row[0]}">GRATIS</p>
              </div>
            </th:block>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
          <p class="text-xs text-slate-500 uppercase font-medium">MRR Estimasi</p>
          <p class="text-xl font-bold text-blue-600 mt-2">Coming soon</p>
          <p class="text-xs text-slate-400 mt-1">Perlu data harga per paket</p>
        </div>
      </div>

      <!-- Recent Payments Table -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100">
          <h3 class="font-semibold text-slate-800">Transaksi Terbaru (20 terakhir)</h3>
        </div>
        <table class="min-w-full divide-y divide-slate-100 text-sm">
          <thead class="bg-slate-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Order ID</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">User</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Paket</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Amount</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Status</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Tanggal</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-50">
            <tr th:each="p : ${recentPayments}" class="hover:bg-slate-50">
              <td class="px-4 py-3 text-xs font-mono text-slate-500" th:text="${p.orderId}">-</td>
              <td class="px-4 py-3">
                <a th:href="'/admin/users/' + ${p.user.id}"
                   class="text-xs text-emerald-600 hover:underline"
                   th:text="${p.user.email}">user@email.com</a>
              </td>
              <td class="px-4 py-3">
                <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-blue-50 text-blue-700"
                      th:text="${p.targetPaket}">PETANI</span>
              </td>
              <td class="px-4 py-3 text-sm font-semibold text-slate-800">
                Rp <span th:text="${#numbers.formatInteger(p.grossAmount, 0, 'COMMA')}">0</span>
              </td>
              <td class="px-4 py-3">
                <span th:classappend="${p.status.name() == 'SUCCESS' or p.status.name() == 'SETTLEMENT'}
                      ? 'bg-emerald-100 text-emerald-700'
                      : (${p.status.name() == 'PENDING'} ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700')"
                      class="text-xs font-medium px-2 py-0.5 rounded-full"
                      th:text="${p.status}">STATUS</span>
              </td>
              <td class="px-4 py-3 text-xs text-slate-400"
                  th:text="${p.createdAt != null} ? ${#temporals.format(p.createdAt, 'dd MMM yyyy')} : '-'">-</td>
            </tr>
            <tr th:if="${#lists.isEmpty(recentPayments)}">
              <td colspan="6" class="px-4 py-12 text-center text-slate-400 text-sm">
                Belum ada transaksi
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
