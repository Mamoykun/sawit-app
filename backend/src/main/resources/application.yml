server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sawitku_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  max-tokens: 2048

# Midtrans payment gateway
# Sandbox: register at https://dashboard.sandbox.midtrans.com/register
# Production: requires PT/UMKM verification
midtrans:
  server-key: ${MIDTRANS_SERVER_KEY:}
  client-key: ${MIDTRANS_CLIENT_KEY:}
  is-production: ${MIDTRANS_IS_PRODUCTION:false}
  notification-url: ${MIDTRANS_NOTIFICATION_URL:https://your-domain.com/api/payments/notification}

management:
  endpoints:
    web:
      exposure:
        include: health,info
