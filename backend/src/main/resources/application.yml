server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  admin-emails: ${ADMIN_EMAILS:}
  agent-api-key: ${ADMIN_AGENT_API_KEY:}  # Secret key for OpenClaw external agent
  email:
    provider: ${EMAIL_PROVIDER:log}  # 'log' = dev (default) | 'smtp' = production
    from: ${EMAIL_FROM:noreply@sawitku.id}
    reset-url-template: ${RESET_URL_TEMPLATE:"https://app.sawitku.id/reset-password?token={token}"}
  feedback-email: ${FEEDBACK_EMAIL:admin@sawitku.id}

spring:
  profiles:
    active: dev
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sawitku_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 900000       # 15 minutes
  refresh-expiration: 2592000000  # 30 days

claude:
  api-key: ${CLAUDE_API_KEY:}
  model:
    haiku: ${CLAUDE_MODEL_HAIKU:claude-haiku-4-5-20251001}
    sonnet: ${CLAUDE_MODEL_SONNET:claude-sonnet-4-20250514}
  max-tokens: 2048
  cache-ttl-days: 30

# Midtrans payment gateway
# Sandbox: register at https://dashboard.sandbox.midtrans.com/register
# Production: requires PT/UMKM verification
midtrans:
  server-key: ${MIDTRANS_SERVER_KEY:}
  client-key: ${MIDTRANS_CLIENT_KEY:}
  is-production: ${MIDTRANS_IS_PRODUCTION:false}
  notification-url: ${MIDTRANS_NOTIFICATION_URL:https://your-domain.com/api/payments/notification}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    git:
      mode: simple
